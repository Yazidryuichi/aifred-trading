# AIFred Trading System — Live Mode Config Overlay
# Merges on top of default.yaml when --mode live is used
# All values here TIGHTEN defaults for safety with micro capital ($10+)

system:
  mode: "live"

assets:
  crypto:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  stocks: []
  forex: []

orchestrator:
  # Temporarily set to 20 to validate execution pipeline with first trade
  # Rule-based fallback produces 28-55% signals, × 0.85 single-source = 24-47%
  # TODO: Raise to 65 once models are trained and Reddit API keys arrive
  min_confidence_threshold: 20
  max_daily_trades: 8

risk:
  max_position_pct: 80.0  # Use up to 80% of actual balance ($8.64 of $10.80)
  max_concurrent_positions: 1
  max_single_trade_loss: 5.0  # $0.54 max loss on $10.80
  min_account_balance: 1.0  # Lower from $5 to allow micro trades
  portfolio_value: 10.80  # Override default $10000 — use actual balance

safety:
  daily_loss_limit_pct: 10.0
  weekly_loss_limit_pct: 20.0
  max_position_pct: 80.0
  max_exposure_pct: 90.0
  max_positions: 1

execution:
  mode: "live"
  exchanges:
    binance:
      enabled: false
    alpaca:
      enabled: false
  hyperliquid:
    enabled: true
    testnet: false
    default_leverage: 2
    max_leverage: 2

data:
  websocket:
    # Binance is geo-blocked from Railway's US datacenter (451 error)
    # Use Hyperliquid for market data since we trade on it anyway
    exchange: "hyperliquid"

validation:
  min_balance_usd: 5
  required_exchanges: []

monitoring:
  telegram:
    enabled: true
    heartbeat_interval: 1800
    daily_report_hour: 0
    alerts:
      trade_executed: true
      position_closed: true
      stop_loss_hit: true
      safety_triggered: true
      system_error: true
      drawdown_warning: true
