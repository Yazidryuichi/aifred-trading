# AIFred Trading System — Live Mode Config Overlay
# Merges on top of default.yaml when --mode live is used
# All values here TIGHTEN defaults for safety with micro capital ($10+)

system:
  mode: "live"

assets:
  crypto:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
    - "HYPE/USDT"
    - "ZEC/USDT"
    - "XRP/USDT"
    - "DOGE/USDT"
    - "ORDI/USDT"
    - "SUI/USDT"
    - "AAVE/USDT"
    - "TAO/USDT"
    - "ENA/USDT"
    - "NEAR/USDT"
    - "AVAX/USDT"
    - "LINK/USDT"
  stocks: []
  forex: []

orchestrator:
  # Aggressive mode — 65% threshold to catch more signals
  min_confidence_threshold: 65
  max_daily_trades: 10  # 30 assets, allow up to 10 trades per day

risk:
  max_position_pct: 100.0
  min_position_pct: 50.0
  max_concurrent_positions: 1
  max_single_trade_loss: 10.0
  min_account_balance: 1.0
  portfolio_value: 5.50
  max_asset_class_exposure_pct: 100.0
  max_single_asset_exposure_pct: 100.0

safety:
  daily_loss_limit_pct: 25.0
  weekly_loss_limit_pct: 50.0
  max_position_pct: 100.0
  max_exposure_pct: 100.0
  max_asset_class_exposure_pct: 100.0
  max_positions: 1

execution:
  mode: "live"
  exchanges:
    binance:
      enabled: false
    alpaca:
      enabled: false
  hyperliquid:
    enabled: true
    testnet: false
    default_leverage: 3
    max_leverage: 3

data:
  websocket:
    # Binance is geo-blocked from Railway's US datacenter (451 error)
    # Use Hyperliquid for market data since we trade on it anyway
    exchange: "hyperliquid"

validation:
  min_balance_usd: 5
  required_exchanges: []

monitoring:
  telegram:
    enabled: true
    heartbeat_interval: 1800
    daily_report_hour: 0
    alerts:
      trade_executed: true
      position_closed: true
      stop_loss_hit: true
      safety_triggered: true
      system_error: true
      drawdown_warning: true
