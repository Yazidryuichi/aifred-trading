# AIFred Trading System — Default Configuration
# All values can be overridden via environment variables: ${ENV_VAR}

system:
  name: "AIFred Multi-Agent Trading System"
  mode: "paper"  # paper | live
  scan_interval: 60  # seconds between scans
  log_level: "INFO"
  db_path: "data/trading.db"

assets:
  crypto:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  stocks:
    - "NVDA"
    - "AAPL"
    - "SPY"
  forex:
    - "EUR/USD"

orchestrator:
  min_confidence_threshold: 78
  tech_weight: 0.60
  sentiment_weight: 0.40
  single_signal_penalty: 0.70
  agreement_bonus: 1.35
  disagreement_penalty: 0.50
  max_daily_trades: 20
  max_daily_loss_pct: 5.0
  cooldown_after_loss_streak: 3  # pause after N consecutive losses

technical:
  min_confluences: 4
  confluence_tier_bonus:
    4: 0.0
    5: 5.0
    6: 10.0
  min_ensemble_agreement: 0.80
  ensemble_ema_alpha: 0.1
  ensemble_ema_alpha_degraded: 0.3
  degradation_threshold: 0.60
  prediction_horizon: 8
  lookback_period: 60
  purge_gap: 20

  kill_zone_boost: 1.15
  off_hours_penalty: 0.85

  models:
    lstm:
      hidden_size: 128
      num_layers: 3
      dropout: 0.2
    transformer:
      d_model: 128
      nhead: 8
      num_layers: 4
      dropout: 0.1
    cnn:
      channels: [32, 64, 128]
      kernel_sizes: [3, 5, 7]

sentiment:
  min_consensus_sources: 3
  source_weights:
    llm: 0.40
    finbert: 0.32
    social: 0.08
    event: 0.20
  sentiment_velocity_weight: 0.15

risk:
  max_position_pct: 3.0
  max_risk_per_trade_pct: 1.5
  max_concurrent_positions: 10
  max_single_asset_pct: 20.0
  max_asset_class_pct: 30.0
  max_correlated_positions: 3
  correlation_threshold: 0.7

  atr_stop_multiplier: 2.0
  atr_trailing_start: 1.0
  atr_trailing_distance: 1.5

  drawdown:
    daily_limit_pct: 5.0
    daily_pause_hours: 24
    weekly_limit_pct: 10.0
    weekly_pause_hours: 72

  dynamic_kelly:
    enabled: true
    lookback_trades: 50
    lookback_days: 30
    fractional_multiplier: 0.5
    min_samples: 20
    max_position_pct: 5.0
    min_position_pct: 0.5
    default_win_rate: 0.55
    default_avg_win: 2.0
    default_avg_loss: 1.0
    drawdown_shrink_start_pct: 3.0
    drawdown_shrink_max_pct: 8.0

  streak_multipliers:
    wins_3: 1.20
    wins_5: 1.30
    losses_2: 0.60
    losses_4: 0.40
    losses_6: 0.20

  volatility_confidence_adjustments:
    low: -5
    normal: 0
    high: 10
    extreme: 20

  time_of_day:
    crypto:
      off_hours: [1, 2, 3, 4, 5]
      off_hours_multiplier: 0.90
    stocks:
      prime_hours: [13, 14, 15, 16, 17, 18, 19, 20]
      prime_multiplier: 1.10
      off_multiplier: 0.85
    forex:
      kill_zones: [[7, 10], [12, 15]]
      kill_zone_multiplier: 1.15
      off_multiplier: 0.85

meta_reasoning:
  enabled: false  # disabled by default, enable when API key is set
  provider: "anthropic"  # "anthropic" or "openai"
  model: "claude-sonnet-4-20250514"
  max_tokens: 1024
  temperature: 0.3
  timeout_seconds: 30
  max_confidence_boost: 10.0
  max_confidence_penalty: 20.0
  min_trigger_confidence: 60.0  # only call LLM if fused confidence exceeds this
  # Use in signal fusion: if enabled, meta-reasoning adjusts confidence after fusion
  apply_to_fusion: true

data:
  websocket:
    enabled: true
    exchange: "binance"
    reconnect_tiers: [0.5, 5.0, 30.0]  # seconds per tier
    dead_connection_timeout: 240  # seconds — Tier 4 dead connection detection
    rest_fallback_interval: 10  # seconds between REST polls when WS is down
    health_check_interval: 30  # seconds between health monitor checks

safety:
  # Non-overridable account safety limits (last line of defense)
  # These can only TIGHTEN the hard-coded limits, never loosen them
  # Hard maximums: daily_loss=2%, weekly_loss=5%, max_position=5%, max_exposure=30%, max_positions=5
  daily_loss_limit_pct: 2.0
  weekly_loss_limit_pct: 5.0
  max_position_pct: 5.0
  max_exposure_pct: 30.0
  max_positions: 5
  kill_switch_enabled: true

execution:
  default_order_type: "limit"
  max_slippage_pct: 0.5
  retry_attempts: 3
  retry_delay_seconds: 5

  exchanges:
    binance:
      enabled: true
      api_key: "${BINANCE_API_KEY}"
      api_secret: "${BINANCE_API_SECRET}"
    alpaca:
      enabled: true
      api_key: "${ALPACA_API_KEY}"
      api_secret: "${ALPACA_API_SECRET}"

  hyperliquid:
    enabled: true
    user_address: "${HYPERLIQUID_ADDRESS}"
    private_key: "${HYPERLIQUID_PRIVATE_KEY}"
    testnet: false
    default_leverage: 3
    max_leverage: 10

validation:
  min_balance_usd: 100  # minimum account balance to start live trading
  required_exchanges: []  # empty = at least one must work; list = all listed must work
  connectivity_timeout_ms: 10000
  check_trading_permissions: true

reconciliation:
  enabled: true
  interval_seconds: 300  # periodic reconciliation every 5 min
  persist_positions: true
  db_path: "data/positions.db"
  on_startup: true  # reconcile on startup
  trust_exchange: true  # exchange state is source of truth

degradation:
  enabled: true
  failure_threshold: 3  # consecutive failures before marking subsystem FAILED
  recovery_backoff_seconds: 300  # wait before retrying failed subsystem
  safe_mode_close_positions: false  # auto-close positions in safe mode?

monitoring:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    heartbeat_interval: 1800  # 30 min
    daily_report_hour: 0  # midnight UTC
    health_report_interval: 14400  # 4 hours
    commands_enabled: true
    # Alert types that trigger notifications
    alerts:
      trade_executed: true
      position_closed: true
      stop_loss_hit: true
      safety_triggered: true
      system_error: true
      drawdown_warning: true
  dashboard:
    enabled: true
    port: 8501

optimizer:
  metric: "win_rate"
  experiment_time_budget: 300  # 5 minutes per experiment
  max_experiments: 100
  validation_period: "2025-12-01/2026-01-31"  # fixed OOS period
  min_trades_for_valid: 20
  keep_threshold: 0.005  # must improve by 0.5% to keep

  walk_forward:
    train_months: 6          # training window length
    validate_months: 1       # validation window length
    test_months: 1           # out-of-sample test window length
    purge_days: 7            # gap between train and validate to prevent leakage
    roll_months: 1           # roll forward step size
    n_trials: 50             # Optuna trials per window (TPE Bayesian search)
    max_drawdown_pct: 15.0   # reject trials with drawdown above this
    min_trades: 10           # reject trials with fewer trades
    metric: "sortino"        # primary optimization target

  tournament:
    enabled: false
    min_contestants: 5
    max_contestants: 20
    min_days_before_promotion: 7
    max_days_before_demotion: 14
    promotion_min_sortino: 0.5
    demotion_max_drawdown_pct: 15.0
    initial_balance: 10000

audit:
  enabled: true
  directory: "data/audit"
